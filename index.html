<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Escritor Blog Master - Sovereign Engine</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6366f1",
                        "secondary": "#10b981",
                        "background": "#0a0a0a",
                        "surface": "#121212",
                        "border": "rgba(255,255,255,0.1)",
                        "text-primary": "#f8fafc",
                        "text-secondary": "#94a3b8"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Newsreader"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-text-primary font-label selection:bg-primary/30">
    <div id="app-shell" class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 border-r border-border bg-surface/50 backdrop-blur-xl flex flex-col py-8 px-4 z-50">
            <div class="px-4 mb-10 flex items-center gap-3">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined">edit_square</span>
                </div>
                <div>
                    <h1 class="text-sm font-black tracking-tight uppercase font-headline">Escritor</h1>
                    <p class="text-[10px] text-text-secondary uppercase tracking-[0.2em]">Blog Master v1.2</p>
                </div>
            </div>

            <nav class="flex-1 space-y-1">
                <button onclick="engine.switchModule('dashboard')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 group" data-module="dashboard">
                    <span class="material-symbols-outlined text-text-secondary group-hover:text-primary">dashboard</span>
                    <span class="font-headline tracking-tight">Painel Principal</span>
                </button>
                <button onclick="engine.switchModule('editor')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 group" data-module="editor">
                    <span class="material-symbols-outlined text-text-secondary group-hover:text-primary">edit_note</span>
                    <span class="font-headline tracking-tight">Escritor Master</span>
                </button>
                <button onclick="engine.switchModule('architect')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 group" data-module="architect">
                    <span class="material-symbols-outlined text-text-secondary group-hover:text-primary">architecture</span>
                    <span class="font-headline tracking-tight">Arquiteto de Design</span>
                </button>
                <button onclick="engine.switchModule('library')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 group" data-module="library">
                    <span class="material-symbols-outlined text-text-secondary group-hover:text-primary">library_books</span>
                    <span class="font-headline tracking-tight">Minha Biblioteca</span>
                </button>
                <button onclick="engine.switchModule('monetization')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 group" data-module="monetization">
                    <span class="material-symbols-outlined text-text-secondary group-hover:text-primary">monetization_on</span>
                    <span class="font-headline tracking-tight">Monetização</span>
                </button>
                <button onclick="engine.switchModule('growth')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 group" data-module="growth">
                    <span class="material-symbols-outlined text-text-secondary group-hover:text-primary">trending_up</span>
                    <span class="font-headline tracking-tight">Growth Hub</span>
                </button>
                <button onclick="engine.switchModule('backlinks')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 group" data-module="backlinks">
                    <span class="material-symbols-outlined text-text-secondary group-hover:text-primary">link</span>
                    <span class="font-headline tracking-tight">Fábrica de Backlinks</span>
                </button>
            </nav>

            <div class="mt-auto pt-6 border-t border-border space-y-2">
                <button class="w-full flex items-center gap-3 px-4 py-2 text-text-secondary hover:text-white transition-all text-xs">
                    <span class="material-symbols-outlined text-sm">settings</span> Configurações
                </button>
                <button class="w-full h-10 bg-primary/10 border border-primary/20 text-primary rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-primary/20 transition-all">
                    Sair do Editor
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col relative overflow-hidden">
            <!-- Header -->
            <header class="h-16 border-b border-border bg-surface/30 backdrop-blur-md px-8 flex items-center justify-between z-40">
                <div id="module-title-container">
                    <h2 id="module-title-top" class="text-sm font-bold uppercase tracking-widest text-text-secondary">Growth Hub</h2>
                </div>
                <div class="flex items-center gap-4">
                    <div id="api-status" class="flex items-center gap-2 bg-secondary/10 px-3 py-1 rounded-full border border-secondary/20">
                        <div class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></div>
                        <span class="text-[9px] font-bold text-secondary uppercase tracking-widest">Motor IA Ativo</span>
                    </div>
                    <div class="w-8 h-8 rounded-full border border-border bg-white/5 flex items-center justify-center">
                        <span class="material-symbols-outlined text-sm">person</span>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <main id="main-content" class="flex-1 overflow-y-auto bg-black/20">
                <!-- Módulos serão carregados aqui -->
                <div class="p-12 text-center text-text-secondary">
                    <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                    Sincronizando Sistema...
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
